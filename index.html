<div id="app">
  <!-- ========== 主站首页 ========== -->
  <section id="home-page">
    <header class="home-header">
      <h1>🐍 Python 冒险之旅</h1>
      <p class="home-desc">选择关卡，编写代码，击败挑战！</p>

      <!-- 游戏 HUD 顶部栏 -->
      <div class="game-hud">
        <div class="game-hud-left">
          <div class="hud-avatar" id="hud-avatar">🐣</div>
          <div class="hud-info">
            <div class="hud-name">ADVENTURER</div>
            <div class="hud-title" id="rank-title">🐣 Python 新手</div>
          </div>
          <span class="hud-level-badge" id="hud-level">Lv.1</span>
        </div>
        <div class="hud-bars">
          <div class="hud-bar-row">
            <span class="hud-bar-label">XP</span>
            <div class="hud-bar-track"><div class="hud-xp-fill" id="xp-bar-fill" style="width:0%"></div></div>
            <span class="hud-bar-val" id="xp-text">0 / 100</span>
          </div>
          <div class="hud-bar-row">
            <span class="hud-bar-label">HP</span>
            <div class="hud-bar-track"><div class="hud-hp-fill" id="hp-bar-fill" style="width:100%"></div></div>
            <span class="hud-bar-val" id="hp-text">100 / 100</span>
          </div>
        </div>
        <div class="hud-right">
          <div class="hud-currency"><span class="hud-currency-icon">🪙</span><span id="gold-display">0</span></div>
        </div>
        <div class="badge-list" id="badge-list" style="flex:0 0 100%;margin-top:4px;"></div>
      </div>

      <!-- 任务追踪 -->
      <div class="quest-tracker">
        <span class="quest-label">📋 当前任务</span>
        <span class="quest-text" id="quest-text">完成第一关：print() 输出函数</span>
        <span class="quest-progress" id="quest-progress">0/26</span>
      </div>

      <div class="search-box">
        <input type="text" id="search-input" placeholder="搜索关卡...">
      </div>
      <div class="home-tip"></div>
    </header>
    <div class="world-map" id="world-map">
      <!-- JS 动态生成世界地图 -->
    </div>
